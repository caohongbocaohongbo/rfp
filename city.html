  <!-- ECharts初始化脚本 -->
  <script>
    // 检查ECharts是否加载成功
    function checkEChartsLoaded() {
      if (typeof echarts === 'undefined') {
        console.error('ECharts library failed to load');
        return false;
      }
      console.log('ECharts loaded successfully, version:', echarts.version);
      return true;
    }

    // 统一商务蓝色配色方案
    const blueColors = [
      '#165DFF', '#4080FF', '#699EFF', '#91BAFF', 
      '#B8D1FF', '#D3E2FF', '#E5EEFF', '#F0F5FF'
    ];

    // 图表实例存储
    let fixedPriceChart, quoteTypeChart, quoteTrendChart, cityTop10Chart;

    // 数据类型状态
    let fixedPriceDataType = 'hotel';
    let quoteTypeDataType = 'hotel';
    let quoteTrendDataType = 'hotel';

    // 固定价报价情况数据
    const fixedPriceData = {
      hotel: [
        { value: 320, name: '新报价' },
        { value: 280, name: '议价中' },
        { value: 240, name: '修订报价' },
        { value: 450, name: '保持原价' },
        { value: 380, name: '已中签' },
        { value: 180, name: '已拒绝' },
        { value: 220, name: '未报价' },
        { value: 120, name: '放弃报价' }
      ],
      night: [
        { value: 1280, name: '新报价' },
        { value: 960, name: '议价中' },
        { value: 720, name: '修订报价' },
        { value: 1850, name: '保持原价' },
        { value: 1120, name: '已中签' },
        { value: 480, name: '已拒绝' },
        { value: 650, name: '未报价' },
        { value: 210, name: '放弃报价' }
      ],
      amount: [
        { value: 384000, name: '新报价' },
        { value: 288000, name: '议价中' },
        { value: 216000, name: '修订报价' },
        { value: 555000, name: '保持原价' },
        { value: 336000, name: '已中签' },
        { value: 144000, name: '已拒绝' },
        { value: 195000, name: '未报价' },
        { value: 63000, name: '放弃报价' }
      ]
    };

    // 报价类型占比数据
    const quoteTypeData = {
      hotel: [
        { value: 54.2, name: '固定价' },
        { value: 27.24, name: '集团折扣价' },
        { value: 18.56, name: '非协议价' }
      ],
      night: [
        { value: 52.8, name: '固定价' },
        { value: 28.5, name: '集团折扣价' },
        { value: 18.7, name: '非协议价' }
      ],
      amount: [
        { value: 51.5, name: '固定价' },
        { value: 29.8, name: '集团折扣价' },
        { value: 18.7, name: '非协议价' }
      ]
    };

    // 报价涨跌平趋势数据
    const quoteTrendData = {
      hotel: [
        { value: 26.16, name: '涨价' },
        { value: 55.23, name: '持平' },
        { value: 18.61, name: '降价' }
      ],
      night: [
        { value: 28.5, name: '涨价' },
        { value: 52.3, name: '持平' },
        { value: 19.2, name: '降价' }
      ],
      amount: [
        { value: 30.2, name: '涨价' },
        { value: 50.5, name: '持平' },
        { value: 19.3, name: '降价' }
      ]
    };

    // 城市TOP10数据
    const cityTop10Data = {
      cities: ['北京', '上海', '深圳', '重庆', '成都', '南京', '天津', '石家庄', '香港', '福州'],
      currentYear: [288, 247, 216, 198, 182, 138, 139, 123, 101, 81],
      lastYear: [250, 228, 208, 190, 175, 133, 134, 118, 97, 78]
    };

    // 1. 固定价报价情况 - 环形图
    function initFixedPriceChart() {
      try {
        const chartDom = document.getElementById('fixedPriceChart');
        if (!chartDom) {
          console.error('fixedPriceChart container not found');
          return;
        }

        fixedPriceChart = echarts.init(chartDom);

        const suffixMap = { hotel: ' 家', night: ' 间夜', amount: ' 元' };
        const currentData = fixedPriceData[fixedPriceDataType];
        const suffix = suffixMap[fixedPriceDataType];

        const option = {
          tooltip: {
            trigger: 'item',
            formatter: function(params) {
              return `${params.name}: ${params.value.toLocaleString()}${suffix} (${params.percent}%)`;
            }
          },
          series: [{
            name: '固定价报价',
            type: 'pie',
            radius: ['55%', '85%'],
            center: ['50%', '50%'],
            avoidLabelOverlap: false,
            itemStyle: {
              borderRadius: 8,
              borderColor: '#fff',
              borderWidth: 3
            },
            label: {
              show: false
            },
            emphasis: {
              label: {
                show: true,
                fontSize: 14,
                fontWeight: 'bold'
              }
            },
            labelLine: {
              show: false
            },
            data: currentData,
            color: blueColors
          }]
        };

        fixedPriceChart.setOption(option);
        console.log('Fixed price chart initialized successfully');
      } catch (error) {
        console.error('Error initializing fixed price chart:', error);
      }
    }

    // 2. 报价类型占比 - 南丁格尔玫瑰图
    function initQuoteTypeChart() {
      try {
        const chartDom = document.getElementById('quoteTypeChart');
        if (!chartDom) {
          console.error('quoteTypeChart container not found');
          return;
        }

        quoteTypeChart = echarts.init(chartDom);

        const currentData = quoteTypeData[quoteTypeDataType];

        const option = {
          tooltip: {
            trigger: 'item',
            formatter: function(params) {
              return `${params.name}: ${params.percent}%`;
            }
          },
          legend: {
            bottom: '5%',
            left: 'center',
            textStyle: {
              fontSize: 12,
              color: '#4E5969'
            }
          },
          series: [{
            name: '报价类型',
            type: 'pie',
            radius: ['20%', '70%'],
            center: ['50%', '45%'],
            roseType: 'area',
            itemStyle: {
              borderRadius: 8,
              borderColor: '#fff',
              borderWidth: 2
            },
            label: {
              show: true,
              formatter: '{b}\n{d}%'
            },
            data: currentData,
            color: ['#165DFF', '#699EFF', '#B8D1FF']
          }]
        };

        quoteTypeChart.setOption(option);
        console.log('Quote type chart initialized successfully');
      } catch (error) {
        console.error('Error initializing quote type chart:', error);
      }
    }

    // 3. 报价涨跌平趋势 - 饼图+柱状图
    function initQuoteTrendChart() {
      try {
        // 饼图
        const pieChartDom = document.getElementById('quoteTrendChart');
        if (pieChartDom) {
          quoteTrendChart = echarts.init(pieChartDom);

          const currentData = quoteTrendData[quoteTrendDataType];

          const pieOption = {
            tooltip: {
              trigger: 'item',
              backgroundColor: 'rgba(255, 255, 255, 0.95)',
              borderColor: '#165DFF',
              borderWidth: 1,
              textStyle: {
                color: '#333'
              },
              formatter: function(params) {
                return `<div style="font-weight:bold;margin-bottom:5px;">${params.name}</div>` +
                       `<div style="display:flex;align-items:center;">` +
                       `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${params.color};margin-right:8px;"></span>` +
                       `<span>占比: <strong>${params.percent}%</strong></span>` +
                       `</div>`;
              }
            },
            legend: {
              orient: 'horizontal',
              bottom: '5%',
              left: 'center',
              itemWidth: 12,
              itemHeight: 12,
              textStyle: {
                fontSize: 12,
                color: '#4E5969'
              }
            },
            series: [{
              name: '涨跌平趋势',
              type: 'pie',
              radius: ['35%', '65%'],
              center: ['50%', '48%'],
              itemStyle: {
                borderRadius: 8,
                borderColor: '#fff',
                borderWidth: 3
              },
              label: {
                show: true,
                formatter: '{b}\n{d}%',
                fontSize: 12,
                fontWeight: 'bold'
              },
              emphasis: {
                label: {
                  show: true,
                  fontSize: 14,
                  fontWeight: 'bold'
                },
                itemStyle: {
                  shadowBlur: 10,
                  shadowOffsetX: 0,
                  shadowColor: 'rgba(0, 0, 0, 0.2)'
                }
              },
              data: currentData,
              color: ['#165DFF', '#4080FF', '#91BAFF']
            }]
          };

          quoteTrendChart.setOption(pieOption);
        }

        console.log('Quote trend chart initialized successfully');
      } catch (error) {
        console.error('Error initializing quote trend charts:', error);
      }
    }

    // 4. 集团城市TOP10情况 - 分组柱状图
    function initCityTop10Chart() {
      try {
        const chartDom = document.getElementById('cityTop10Chart');
        if (!chartDom) {
          console.error('cityTop10Chart container not found');
          return;
        }

        cityTop10Chart = echarts.init(chartDom);

        const option = {
          tooltip: {
            trigger: 'axis',
            axisPointer: {
              type: 'shadow'
            },
            formatter: function(params) {
              const cityIdx = params[0].dataIndex;
              const city = cityTop10Data.cities[cityIdx];
              const currentYear = cityTop10Data.currentYear[cityIdx];
              const lastYear = cityTop10Data.lastYear[cityIdx];
              const yoy = ((currentYear - lastYear) / lastYear * 100).toFixed(1);
              const yoyColor = yoy >= 0 ? '#00B42A' : '#F53F3F';
              const yoyIcon = yoy >= 0 ? '↑' : '↓';
              let result = `<div style="font-weight:bold;margin-bottom:5px;">${city}</div>`;
              params.forEach(param => {
                result += `${param.marker} ${param.seriesName}: ${param.value}<br/>`;
              });
              result += `<div style="margin-top:5px;padding-top:5px;border-top:1px solid #eee;">`;
              result += `<span style="color:${yoyColor};font-weight:bold;">${yoyIcon} 同比: ${yoy}%</span>`;
              result += `</div>`;
              return result;
            }
          },
          grid: {
            left: '3%',
            right: '4%',
            bottom: '3%',
            top: '10%',
            containLabel: true
          },
          xAxis: {
            type: 'category',
            data: cityTop10Data.cities,
            axisLine: {
              lineStyle: { color: '#C9CDD4' }
            },
            axisLabel: {
              fontSize: 14,
              color: '#4E5969',
              fontWeight: 'bold'
            },
            axisTick: {
              show: false
            }
          },
          yAxis: {
            type: 'value',
            axisLine: { show: false },
            axisTick: { show: false },
            axisLabel: { show: false },
            splitLine: { show: false }
          },
          series: [
            {
              name: '今年城市签约均价',
              type: 'bar',
              barWidth: '24%',
              barGap: '20%',
              itemStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                  { offset: 0, color: 'rgba(91,162,255,1)' },
                  { offset: 1, color: 'rgba(29,116,234,1)' }
                ])
              },
              data: cityTop10Data.currentYear
            },
            {
              name: '去年城市签约均价',
              type: 'bar',
              barWidth: '24%',
              itemStyle: {
                color: 'rgba(207,228,255,1)',
                borderColor: 'rgba(175,207,255,1)',
                borderWidth: 1
              },
              data: cityTop10Data.lastYear
            }
          ]
        };

        cityTop10Chart.setOption(option);
        console.log('City TOP10 chart initialized successfully');
      } catch (error) {
        console.error('Error initializing city TOP10 chart:', error);
      }
    }

    // 更新按钮样式
    function updateButtonStyle(prefix, type) {
      try {
        const hotelBtn = document.getElementById(`${prefix}-hotel-btn`);
        const nightBtn = document.getElementById(`${prefix}-night-btn`);
        const amountBtn = document.getElementById(`${prefix}-amount-btn`);

        if (!hotelBtn || !nightBtn || !amountBtn) {
          console.error(`Buttons not found for prefix: ${prefix}`);
          return;
        }

        const activeClass = 'w-[71px] h-[28px] rounded-[50px] border border-[rgba(239,239,243,1)] bg-[rgba(255,255,255,1)] flex justify-center items-center cursor-pointer';
        const activeTextClass = 'text-[14px] whitespace-nowrap text-center text-[rgba(22,93,255,1)] leading-[20px] font-normal tracking-[-0.15px]';
        
        const inactiveClass = 'w-[71px] h-[28px] rounded-[4px] flex justify-center items-center cursor-pointer';
        const inactiveTextClass = 'text-[14px] whitespace-nowrap text-center text-[rgba(29,33,41,1)] leading-[20px] font-normal tracking-[-0.15px]';
        const inactiveTextClass2 = 'text-[14px] whitespace-nowrap text-center text-[rgba(78,89,105,1)] leading-[20px] font-normal tracking-[-0.15px]';

        // 重置所有按钮
        hotelBtn.className = inactiveClass;
        hotelBtn.querySelector('div').className = inactiveTextClass;
        nightBtn.className = inactiveClass;
        nightBtn.querySelector('div').className = inactiveTextClass;
        amountBtn.className = inactiveClass;
        amountBtn.querySelector('div').className = inactiveTextClass2;

        // 设置选中按钮
        if (type === 'hotel') {
          hotelBtn.className = activeClass;
          hotelBtn.querySelector('div').className = activeTextClass;
        } else if (type === 'night') {
          nightBtn.className = activeClass;
          nightBtn.querySelector('div').className = activeTextClass;
        } else if (type === 'amount') {
          amountBtn.className = activeClass;
          amountBtn.querySelector('div').className = activeTextClass;
        }
      } catch (error) {
        console.error('Error updating button style:', error);
      }
    }

    // 绑定按钮事件
    function bindButtonEvents() {
      // 固定价报价情况
      document.getElementById('fixedPrice-hotel-btn').addEventListener('click', () => {
        fixedPriceDataType = 'hotel';
        fixedPriceChart.setOption({ series: [{ data: fixedPriceData[fixedPriceDataType] }] });
        updateButtonStyle('fixedPrice', 'hotel');
      });
      document.getElementById('fixedPrice-night-btn').addEventListener('click', () => {
        fixedPriceDataType = 'night';
        fixedPriceChart.setOption({ series: [{ data: fixedPriceData[fixedPriceDataType] }] });
        updateButtonStyle('fixedPrice', 'night');
      });
      document.getElementById('fixedPrice-amount-btn').addEventListener('click', () => {
        fixedPriceDataType = 'amount';
        fixedPriceChart.setOption({ series: [{ data: fixedPriceData[fixedPriceDataType] }] });
        updateButtonStyle('fixedPrice', 'amount');
      });

      // 报价类型占比
      document.getElementById('quoteType-hotel-btn').addEventListener('click', () => {
        quoteTypeDataType = 'hotel';
        quoteTypeChart.setOption({ series: [{ data: quoteTypeData[quoteTypeDataType] }] });
        updateButtonStyle('quoteType', 'hotel');
      });
      document.getElementById('quoteType-night-btn').addEventListener('click', () => {
        quoteTypeDataType = 'night';
        quoteTypeChart.setOption({ series: [{ data: quoteTypeData[quoteTypeDataType] }] });
        updateButtonStyle('quoteType', 'night');
      });
      document.getElementById('quoteType-amount-btn').addEventListener('click', () => {
        quoteTypeDataType = 'amount';
        quoteTypeChart.setOption({ series: [{ data: quoteTypeData[quoteTypeDataType] }] });
        updateButtonStyle('quoteType', 'amount');
      });

      // 报价涨跌平趋势
      document.getElementById('quoteTrend-hotel-btn').addEventListener('click', () => {
        quoteTrendDataType = 'hotel';
        quoteTrendChart.setOption({ series: [{ data: quoteTrendData[quoteTrendDataType] }] });
        updateButtonStyle('quoteTrend', 'hotel');
      });
      document.getElementById('quoteTrend-night-btn').addEventListener('click', () => {
        quoteTrendDataType = 'night';
        quoteTrendChart.setOption({ series: [{ data: quoteTrendData[quoteTrendDataType] }] });
        updateButtonStyle('quoteTrend', 'night');
      });
      document.getElementById('quoteTrend-amount-btn').addEventListener('click', () => {
        quoteTrendDataType = 'amount';
        quoteTrendChart.setOption({ series: [{ data: quoteTrendData[quoteTrendDataType] }] });
        updateButtonStyle('quoteTrend', 'amount');
      });
    }

    // 响应式处理函数
    function handleResize() {
      try {
        clearTimeout(window.resizeTimer);
        window.resizeTimer = setTimeout(function() {
          if (fixedPriceChart) fixedPriceChart.resize();
          if (quoteTypeChart) quoteTypeChart.resize();
          if (quoteTrendChart) quoteTrendChart.resize();

          if (cityTop10Chart) cityTop10Chart.resize();
          console.log('Charts resized successfully');
        }, 250);
      } catch (error) {
        console.error('Error during resize:', error);
      }
    }

    // 初始化所有图表
    function initializeAllCharts() {
      try {
        if (!checkEChartsLoaded()) {
          return;
        }

        console.log('Initializing all charts...');
        
        initFixedPriceChart();
        initQuoteTypeChart();
        initQuoteTrendChart();
        initCityTop10Chart();
        
        // 初始化按钮样式
        updateButtonStyle('fixedPrice', 'hotel');
        updateButtonStyle('quoteType', 'hotel');
        updateButtonStyle('quoteTrend', 'hotel');

        // 绑定按钮事件
        bindButtonEvents();
        
        // 添加窗口大小变化监听
        window.addEventListener('resize', handleResize);
        console.log('All charts initialized successfully');
      } catch (error) {
        console.error('Error during chart initialization:', error);
      }
    }

    // 等待DOM和ECharts加载完成
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initializeAllCharts);
    } else {
      initializeAllCharts();
    }

    // 窗口加载完成后再次确保图表渲染
    window.addEventListener('load', function() {
      setTimeout(function() {
        console.log('Re-initializing charts after window load...');
        initializeAllCharts();
      }, 100);
    });
  </script>
</body>
</html>
