  <script>
    // 检查ECharts是否加载成功
    function checkEChartsLoaded() {
      if (typeof echarts === 'undefined') {
        console.error('ECharts library failed to load');
        return false;
      }
      console.log('ECharts loaded successfully, version:', echarts.version);
      return true;
    }

    // 统一商务蓝色配色方案
    const blueColors = [
      '#165DFF', '#4080FF', '#699EFF', '#91BAFF', 
      '#B8D1FF', '#D3E2FF', '#E5EEFF', '#F0F5FF'
    ];

    // 图表实例存储
    let fixedPriceChart, quoteTypeChart, quoteTrendChart, priceDistributionChart;

    // 数据类型状态
    let fixedPriceDataType = 'hotel';
    let quoteTypeDataType = 'hotel';
    let quoteTrendDataType = 'hotel';

    // 固定价报价情况数据
    const fixedPriceData = {
      hotel: [
        { value: 320, name: '新报价' },
        { value: 280, name: '议价中' },
        { value: 240, name: '修订报价' },
        { value: 450, name: '保持原价' },
        { value: 380, name: '已中签' },
        { value: 180, name: '已拒绝' },
        { value: 220, name: '未报价' },
        { value: 120, name: '放弃报价' }
      ],
      night: [
        { value: 1280, name: '新报价' },
        { value: 960, name: '议价中' },
        { value: 720, name: '修订报价' },
        { value: 1850, name: '保持原价' },
        { value: 1120, name: '已中签' },
        { value: 480, name: '已拒绝' },
        { value: 650, name: '未报价' },
        { value: 210, name: '放弃报价' }
      ],
      amount: [
        { value: 384000, name: '新报价' },
        { value: 288000, name: '议价中' },
        { value: 216000, name: '修订报价' },
        { value: 555000, name: '保持原价' },
        { value: 336000, name: '已中签' },
        { value: 144000, name: '已拒绝' },
        { value: 195000, name: '未报价' },
        { value: 63000, name: '放弃报价' }
      ]
    };

    // 报价类型占比数据
    const quoteTypeData = {
      hotel: [
        { value: 54.2, name: '固定价' },
        { value: 27.24, name: '集团折扣价' },
        { value: 18.56, name: '非协议价' }
      ],
      night: [
        { value: 52.8, name: '固定价' },
        { value: 28.5, name: '集团折扣价' },
        { value: 18.7, name: '非协议价' }
      ],
      amount: [
        { value: 51.5, name: '固定价' },
        { value: 29.8, name: '集团折扣价' },
        { value: 18.7, name: '非协议价' }
      ]
    };

    // 报价涨跌平趋势数据
    const quoteTrendData = {
      hotel: [
        { value: 26.16, name: '涨价' },
        { value: 55.23, name: '持平' },
        { value: 18.61, name: '降价' }
      ],
      night: [
        { value: 28.5, name: '涨价' },
        { value: 52.3, name: '持平' },
        { value: 19.2, name: '降价' }
      ],
      amount: [
        { value: 30.2, name: '涨价' },
        { value: 50.5, name: '持平' },
        { value: 19.3, name: '降价' }
      ]
    };

    // 酒店签约价格分布数据
    const priceDistributionData = {
      priceRanges: ['¥0~200', '¥201~250', '¥251~300', '¥301~350', '¥351~400', '¥401~450', '¥451~500', '¥501~550', '¥551~600', '¥601~650', '¥651~700', '¥701~800', '¥800'],
      currentYear: [120, 180, 220, 280, 350, 420, 380, 320, 260, 200, 150, 100, 80],
      lastYear: [100, 160, 200, 260, 320, 400, 360, 300, 240, 180, 130, 90, 70]
    };

    // 1. 固定价报价情况 - 环形图
    function initFixedPriceChart() {
      try {
        const chartDom = document.getElementById('fixedPriceChart');
        if (!chartDom) {
          console.error('fixedPriceChart container not found');
          return;
        }

        fixedPriceChart = echarts.init(chartDom);

        const suffixMap = { hotel: ' 家', night: ' 间夜', amount: ' 元' };
        const currentData = fixedPriceData[fixedPriceDataType];
        const suffix = suffixMap[fixedPriceDataType];

        const option = {
          tooltip: {
            trigger: 'item',
            formatter: function(params) {
              return `${params.name}: ${params.value.toLocaleString()}${suffix} (${params.percent}%)`;
            }
          },
          series: [{
            name: '固定价报价',
            type: 'pie',
            radius: ['55%', '85%'],
            center: ['50%', '50%'],
            avoidLabelOverlap: false,
            itemStyle: {
              borderRadius: 8,
              borderColor: '#fff',
              borderWidth: 3
            },
            label: {
              show: false
            },
            emphasis: {
              label: {
                show: true,
                fontSize: 14,
                fontWeight: 'bold'
              }
            },
            labelLine: {
              show: false
            },
            data: currentData,
            color: blueColors
          }]
        };

        fixedPriceChart.setOption(option);
        console.log('Fixed price chart initialized successfully');
      } catch (error) {
        console.error('Error initializing fixed price chart:', error);
      }
    }

    // 2. 报价类型占比 - 南丁格尔玫瑰图
    function initQuoteTypeChart() {
      try {
        const chartDom = document.getElementById('quoteTypeChart');
        if (!chartDom) {
          console.error('quoteTypeChart container not found');
          return;
        }

        quoteTypeChart = echarts.init(chartDom);

        const currentData = quoteTypeData[quoteTypeDataType];

        const option = {
          tooltip: {
            trigger: 'item',
            formatter: function(params) {
              return `${params.name}: ${params.percent}%`;
            }
          },
          legend: {
            bottom: '5%',
            left: 'center',
            textStyle: {
              fontSize: 12,
              color: '#4E5969'
            }
          },
          series: [{
            name: '报价类型',
            type: 'pie',
            radius: ['20%', '70%'],
            center: ['50%', '45%'],
            roseType: 'area',
            itemStyle: {
              borderRadius: 8,
              borderColor: '#fff',
              borderWidth: 2
            },
            label: {
              show: true,
              formatter: '{b}\n{d}%'
            },
            data: currentData,
            color: ['#165DFF', '#699EFF', '#B8D1FF']
          }]
        };

        quoteTypeChart.setOption(option);
        console.log('Quote type chart initialized successfully');
      } catch (error) {
        console.error('Error initializing quote type chart:', error);
      }
    }

    // 3. 报价涨跌平趋势 - 饼图
    function initQuoteTrendChart() {
      try {
        const pieChartDom = document.getElementById('quoteTrendChart');
        if (pieChartDom) {
          quoteTrendChart = echarts.init(pieChartDom);

          const currentData = quoteTrendData[quoteTrendDataType];

          const pieOption = {
            tooltip: {
              trigger: 'item',
              backgroundColor: 'rgba(255, 255, 255, 0.95)',
              borderColor: '#165DFF',
              borderWidth: 1,
              textStyle: {
                color: '#333'
              },
              formatter: function(params) {
                return `<div style="font-weight:bold;margin-bottom:5px;">${params.name}</div>` +
                       `<div style="display:flex;align-items:center;">` +
                       `<span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${params.color};margin-right:8px;"></span>` +
                       `<span>占比: <strong>${params.percent}%</strong></span>` +
                       `</div>`;
              }
            },
            legend: {
              orient: 'horizontal',
              bottom: '5%',
              left: 'center',
              itemWidth: 12,
              itemHeight: 12,
              textStyle: {
                fontSize: 12,
                color: '#4E5969'
              }
            },
            series: [{
              name: '涨跌平趋势',
              type: 'pie',
              radius: ['35%', '65%'],
              center: ['50%', '48%'],
              itemStyle: {
                borderRadius: 8,
                borderColor: '#fff',
                borderWidth: 3
              },
              label: {
                show: true,
                formatter: '{b}\n{d}%',
                fontSize: 12,
                fontWeight: 'bold'
              },
              emphasis: {
                label: {
                  show: true,
                  fontSize: 14,
                  fontWeight: 'bold'
                },
                itemStyle: {
                  shadowBlur: 10,
                  shadowOffsetX: 0,
                  shadowColor: 'rgba(0, 0, 0, 0.2)'
                }
              },
              data: currentData,
              color: ['#165DFF', '#4080FF', '#91BAFF']
            }]
          };

          quoteTrendChart.setOption(pieOption);
        }

        console.log('Quote trend chart initialized successfully');
      } catch (error) {
        console.error('Error initializing quote trend chart:', error);
      }
    }

    // 4. 酒店签约价格分布 - 双向条形图（金额列在中间）
    function initPriceDistributionChart() {
      try {
        const chartDom = document.getElementById('priceDistributionChart');
        if (!chartDom) {
          console.error('priceDistributionChart container not found');
          return;
        }

        priceDistributionChart = echarts.init(chartDom);

        // 数据：价格区间从上到下是 ¥800 到 ¥0~200
        const priceRanges = ['¥800', '¥701~800', '¥651~700', '¥601~650', '¥551~600', '¥501~550', '¥451~500', '¥401~450', '¥351~400', '¥301~350', '¥251~300', '¥201~250', '¥0~200'];
        const currentYearData = [80, 100, 150, 200, 260, 320, 380, 420, 350, 280, 220, 180, 120];
        const lastYearData = [70, 90, 130, 180, 240, 300, 360, 400, 340, 270, 210, 170, 110];

        const option = {
          tooltip: {
            trigger: 'axis',
            axisPointer: {
              type: 'shadow'
            },
            formatter: function(params) {
              const priceRange = priceRanges[params[0].dataIndex];
              let result = `<div style="font-weight:bold;margin-bottom:5px;">${priceRange}</div>`;
              params.forEach(param => {
                if (param.seriesName !== '标签') {
                  result += `${param.marker} ${param.seriesName}: ${param.value}家<br/>`;
                }
              });
              return result;
            }
          },
          grid: [
            // 左侧网格（今年）
            { left: '5%', width: '32%', top: '5%', bottom: '5%', containLabel: false },
            // 中间网格（标签）
            { left: '38%', width: '24%', top: '5%', bottom: '5%', containLabel: false },
            // 右侧网格（去年）
            { right: '5%', width: '32%', top: '5%', bottom: '5%', containLabel: false }
          ],
          xAxis: [
            // 左侧X轴（今年）- 反向显示
            {
              type: 'value',
              gridIndex: 0,
              inverse: true,
              axisLine: { show: false },
              axisTick: { show: false },
              axisLabel: { show: false },
              splitLine: { show: false }
            },
            // 中间X轴（标签）
            {
              type: 'value',
              gridIndex: 1,
              axisLine: { show: false },
              axisTick: { show: false },
              axisLabel: { show: false },
              splitLine: { show: false }
            },
            // 右侧X轴（去年）
            {
              type: 'value',
              gridIndex: 2,
              axisLine: { show: false },
              axisTick: { show: false },
              axisLabel: { show: false },
              splitLine: { show: false }
            }
          ],
          yAxis: [
            // 左侧Y轴（今年）- 不显示标签
            {
              type: 'category',
              gridIndex: 0,
              data: priceRanges,
              position: 'left',
              axisLine: { show: false },
              axisTick: { show: false },
              axisLabel: { show: false }
            },
            // 中间Y轴（标签）- 显示价格区间
            {
              type: 'category',
              gridIndex: 1,
              data: priceRanges,
              position: 'left',
              axisLine: { show: false },
              axisTick: { show: false },
              axisLabel: {
                fontSize: 12,
                color: '#4E5969',
                margin: -90,
                align: 'center',
                fontWeight: 'bold'
              }
            },
            // 右侧Y轴（去年）- 不显示标签
            {
              type: 'category',
              gridIndex: 2,
              data: priceRanges,
              position: 'right',
              axisLine: { show: false },
              axisTick: { show: false },
              axisLabel: { show: false }
            }
          ],
          series: [
            {
              name: '今年',
              type: 'bar',
              xAxisIndex: 0,
              yAxisIndex: 0,
              barWidth: '50%',
              itemStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 1, 0, [
                  { offset: 0, color: '#5BA2FF' },
                  { offset: 1, color: '#1D74EA' }
                ]),
                borderRadius: [4, 0, 0, 4]
              },
              data: currentYearData
            },
            {
              name: '标签',
              type: 'bar',
              xAxisIndex: 1,
              yAxisIndex: 1,
              barWidth: '0%',
              itemStyle: { color: 'transparent' },
              data: priceRanges.map(() => 0),
              tooltip: { show: false }
            },
            {
              name: '去年',
              type: 'bar',
              xAxisIndex: 2,
              yAxisIndex: 2,
              barWidth: '50%',
              itemStyle: {
                color: '#CFE4FF',
                borderRadius: [0, 4, 4, 0]
              },
              data: lastYearData
            }
          ]
        };

        priceDistributionChart.setOption(option);
        console.log('Price distribution chart initialized successfully');
      } catch (error) {
        console.error('Error initializing price distribution chart:', error);
      }
    }

    // 更新按钮样式
    function updateButtonStyle(prefix, type) {
      try {
        const hotelBtn = document.getElementById(`${prefix}-hotel-btn`);
        const nightBtn = document.getElementById(`${prefix}-night-btn`);
        const amountBtn = document.getElementById(`${prefix}-amount-btn`);

        if (!hotelBtn || !nightBtn || !amountBtn) {
          console.error(`Buttons not found for prefix: ${prefix}`);
          return;
        }

        const activeClass = 'w-[71px] h-[28px] rounded-[50px] border border-[rgba(239,239,243,1)] bg-[rgba(255,255,255,1)] flex flex-row flex-nowrap justify-center items-center box-border cursor-pointer';
        const activeTextClass = 'font-[Inter] text-[14px] whitespace-nowrap text-center text-[rgba(22,93,255,1)] leading-[20px] tracking-[normal] font-normal';
        
        const inactiveClass = 'w-[71px] h-[28px] rounded-[4px] flex flex-row flex-nowrap justify-center items-center box-border cursor-pointer';
        const inactiveTextClass = 'font-[Inter] text-[14px] whitespace-nowrap text-center text-[rgba(29,33,41,1)] leading-[20px] tracking-[normal] font-normal';
        const inactiveTextClass2 = 'font-[Inter] text-[14px] whitespace-nowrap text-center text-[rgba(78,89,105,1)] leading-[20px] tracking-[normal] font-normal';

        // 重置所有按钮
        hotelBtn.className = inactiveClass;
        hotelBtn.querySelector('div').className = inactiveTextClass;
        nightBtn.className = inactiveClass;
        nightBtn.querySelector('div').className = inactiveTextClass;
        amountBtn.className = inactiveClass;
        amountBtn.querySelector('div').className = inactiveTextClass2;

        // 设置选中按钮
        if (type === 'hotel') {
          hotelBtn.className = activeClass;
          hotelBtn.querySelector('div').className = activeTextClass;
        } else if (type === 'night') {
          nightBtn.className = activeClass;
          nightBtn.querySelector('div').className = activeTextClass;
        } else if (type === 'amount') {
          amountBtn.className = activeClass;
          amountBtn.querySelector('div').className = activeTextClass;
        }
      } catch (error) {
        console.error('Error updating button style:', error);
      }
    }

    // 绑定按钮事件
    function bindButtonEvents() {
      // 固定价报价情况
      document.getElementById('fixedPrice-hotel-btn').addEventListener('click', () => {
        fixedPriceDataType = 'hotel';
        fixedPriceChart.setOption({ series: [{ data: fixedPriceData[fixedPriceDataType] }] });
        updateButtonStyle('fixedPrice', 'hotel');
      });
      document.getElementById('fixedPrice-night-btn').addEventListener('click', () => {
        fixedPriceDataType = 'night';
        fixedPriceChart.setOption({ series: [{ data: fixedPriceData[fixedPriceDataType] }] });
        updateButtonStyle('fixedPrice', 'night');
      });
      document.getElementById('fixedPrice-amount-btn').addEventListener('click', () => {
        fixedPriceDataType = 'amount';
        fixedPriceChart.setOption({ series: [{ data: fixedPriceData[fixedPriceDataType] }] });
        updateButtonStyle('fixedPrice', 'amount');
      });

      // 报价类型占比
      document.getElementById('quoteType-hotel-btn').addEventListener('click', () => {
        quoteTypeDataType = 'hotel';
        quoteTypeChart.setOption({ series: [{ data: quoteTypeData[quoteTypeDataType] }] });
        updateButtonStyle('quoteType', 'hotel');
      });
      document.getElementById('quoteType-night-btn').addEventListener('click', () => {
        quoteTypeDataType = 'night';
        quoteTypeChart.setOption({ series: [{ data: quoteTypeData[quoteTypeDataType] }] });
        updateButtonStyle('quoteType', 'night');
      });
      document.getElementById('quoteType-amount-btn').addEventListener('click', () => {
        quoteTypeDataType = 'amount';
        quoteTypeChart.setOption({ series: [{ data: quoteTypeData[quoteTypeDataType] }] });
        updateButtonStyle('quoteType', 'amount');
      });

      // 报价涨跌平趋势
      document.getElementById('quoteTrend-hotel-btn').addEventListener('click', () => {
        quoteTrendDataType = 'hotel';
        quoteTrendChart.setOption({ series: [{ data: quoteTrendData[quoteTrendDataType] }] });
        updateButtonStyle('quoteTrend', 'hotel');
      });
      document.getElementById('quoteTrend-night-btn').addEventListener('click', () => {
        quoteTrendDataType = 'night';
        quoteTrendChart.setOption({ series: [{ data: quoteTrendData[quoteTrendDataType] }] });
        updateButtonStyle('quoteTrend', 'night');
      });
      document.getElementById('quoteTrend-amount-btn').addEventListener('click', () => {
        quoteTrendDataType = 'amount';
        quoteTrendChart.setOption({ series: [{ data: quoteTrendData[quoteTrendDataType] }] });
        updateButtonStyle('quoteTrend', 'amount');
      });
    }

    // 响应式处理函数
    function handleResize() {
      try {
        clearTimeout(window.resizeTimer);
        window.resizeTimer = setTimeout(function() {
          if (fixedPriceChart) fixedPriceChart.resize();
          if (quoteTypeChart) quoteTypeChart.resize();
          if (quoteTrendChart) quoteTrendChart.resize();
          if (priceDistributionChart) priceDistributionChart.resize();
          console.log('Charts resized successfully');
        }, 250);
      } catch (error) {
        console.error('Error during resize:', error);
      }
    }

    // 初始化所有图表
    function initializeAllCharts() {
      try {
        if (!checkEChartsLoaded()) {
          return;
        }

        console.log('Initializing all charts...');
        
        initFixedPriceChart();
        initQuoteTypeChart();
        initQuoteTrendChart();
        initPriceDistributionChart();
        
        // 初始化按钮样式
        updateButtonStyle('fixedPrice', 'hotel');
        updateButtonStyle('quoteType', 'hotel');
        updateButtonStyle('quoteTrend', 'hotel');

        // 绑定按钮事件
        bindButtonEvents();
        
        // 添加窗口大小变化监听
        window.addEventListener('resize', handleResize);
        console.log('All charts initialized successfully');
      } catch (error) {
        console.error('Error during chart initialization:', error);
      }
    }

    // 等待DOM和ECharts加载完成
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initializeAllCharts);
    } else {
      initializeAllCharts();
    }

    // 窗口加载完成后再次确保图表渲染
    window.addEventListener('load', function() {
      setTimeout(function() {
        console.log('Re-initializing charts after window load...');
        initializeAllCharts();
      }, 100);
    });
  </script>
</body>
</html>
