        { value: 216000, name: '修订报价' },
        { value: 555000, name: '保持原价' },
        { value: 336000, name: '已中签' },

      yoy: ['+12.3%', '+8.4%', '+4.1%', '+12.3%', '+8.4%', '+4.1%', '+12.3%', '+8.4%', '+4.1%', '+4.1%']
    };

    // 1. 固定价报价情况 - 环形图
    function initFixedPriceChart() {
      try {
        const chartDom = document.getElementById('fixedPriceChart');
        if (!chartDom) {
          console.error('fixedPriceChart container not found');
          return;
        }

        fixedPriceChart = echarts.init(chartDom);

        const suffixMap = { night: ' 间夜', amount: ' 元' };
        const currentData = fixedPriceData[fixedPriceDataType];
        const suffix = suffixMap[fixedPriceDataType];

        const option = {
          tooltip: {
            trigger: 'item',
            formatter: function(params) {
              return `${params.name}: ${params.value.toLocaleString()}${suffix} (${params.percent}%)`;
            }
          },
          series: [{
            name: '固定价报价',
            type: 'pie',
            radius: ['55%', '85%'],
            center: ['50%', '50%'],
            avoidLabelOverlap: false,
            itemStyle: {
              borderRadius: 8,
              borderColor: '#fff',
              borderWidth: 3
            },
            label: {
              show: false
            },
            emphasis: {
              label: {
                show: true,
                fontSize: 16,
                fontWeight: 'bold'
              }

            labelLine: {
              show: false
            },
            data: currentData,
            color: blueColors

        fixedPriceChart.setOption(option);
        console.log('Fixed price chart initialized successfully');
      } catch (error) {
        console.error('Error initializing fixed price chart:', error);
      }
    }

    // 更新固定价报价情况按钮样式
    function updateFixedPriceButtonStyle(type) {
      try {
        const nightBtn = document.getElementById('fixedPrice-night-btn');

        if (!nightBtn || !amountBtn) {
          console.error('Fixed price buttons not found');

        }

        const activeClass = 'w-[50px] h-[30px] rounded-[999px] border border-[rgba(234,234,234,1)] bg-[rgba(255,255,255,1)] mr-[2px] flex justify-center items-center cursor-pointer';
        const activeTextClass = 'text-[12px] whitespace-nowrap text-center text-[rgba(49,51,51,1)] leading-[12px] font-bold';

    // 绑定固定价报价情况按钮事件

        });

    // 2. 集团折扣情况 - 环形图（中心显示百分比）

            name: '折扣分析',
            type: 'pie',
            radius: ['65%', '85%'],
            center: ['50%', '50%'],
            avoidLabelOverlap: false,
            itemStyle: {
              borderRadius: 0,
              borderColor: '#fff',
              borderWidth: 0
            },
            label: {
              show: false
            },
            emphasis: {
              scale: false
            },
            data: currentData,
            color: ['#165DFF', '#E5EEFF']
          }]
        };

        discountChart.setOption(option);
        console.log('Discount chart initialized successfully');
      } catch (error) {
        console.error('Error initializing discount chart:', error);
      }
    }

    // 3. 集团城市TOP10情况 - 分组柱状图（结合同比数据）
    function initCityTop10Chart() {
      try {
        const chartDom = document.getElementById('cityTop10Chart');
        if (!chartDom) {
          console.error('cityTop10Chart container not found');
          return;
        }

        cityTop10Chart = echarts.init(chartDom);

        const option = {
          tooltip: {
            trigger: 'axis',
            axisPointer: {
              type: 'shadow'
            },
            formatter: function(params) {

                result += `${param.marker} ${param.seriesName}: ${param.value}<br/>`;
              });
              result += `<div style="margin-top:5px;color:#165DFF;font-weight:bold;">同比: ${yoy}</div>`;
              return result;
            }
          },
          grid: {
            left: '3%',
            right: '4%',
            bottom: '3%',
            top: '10%',
            containLabel: true
          },
          xAxis: {
            type: 'category',
            data: cityTop10Data.cities,
            axisLine: {
              lineStyle: { color: '#C9CDD4' }
            },
            axisLabel: {
              fontSize: 14,
              color: '#4E5969',
              fontWeight: 'bold'
            },
            axisTick: {
              show: false
            }
          },
          yAxis: {
            type: 'value',
            axisLine: { show: false },
            axisTick: { show: false },
            axisLabel: { show: false },
            splitLine: { show: false }
          },
          series: [
            {
              name: '今年城市签约均价',
              type: 'bar',
              barWidth: '24%',
              barGap: '20%',
              itemStyle: {
                color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
                  { offset: 0, color: 'rgba(91,162,255,1)' },
                  { offset: 1, color: 'rgba(29,116,234,1)' }
                ])
              },
              data: cityTop10Data.currentYear
            },
            {
              name: '去年城市签约均价',
              type: 'bar',
              barWidth: '24%',
              itemStyle: {
                color: 'rgba(207,228,255,1)',
                borderColor: 'rgba(175,207,255,1)',
                borderWidth: 1
              },
              data: cityTop10Data.lastYear

      } catch (error) {
        console.error('Error initializing city TOP10 chart:', error);

    // 按钮样式更新函数
    function updateDiscountButtonStyle(type) {
      try {
        const nightBtn = document.getElementById('discount-night-btn');
        const amountBtn = document.getElementById('discount-amount-btn');

        if (!nightBtn || !amountBtn) {
          console.error('Discount buttons not found');
          return;
        }

        const activeClass = 'w-[50px] h-[30px] rounded-[999px] border border-[rgba(234,234,234,1)] bg-[rgba(255,255,255,1)] mr-[2px] flex justify-center items-center cursor-pointer';
        const activeTextClass = 'text-[12px] whitespace-nowrap text-center text-[rgba(49,51,51,1)] leading-[12px] font-bold';
        
        const inactiveClass = 'w-[50px] h-[30px] rounded-[999px] border border-transparent flex justify-center items-center cursor-pointer';
        const inactiveTextClass = 'text-[12px] whitespace-nowrap text-center text-[rgba(148,153,153,1)] leading-[12px] font-bold';

        if (type === 'night') {
          nightBtn.className = activeClass;
          nightBtn.querySelector('div').className = activeTextClass;
          amountBtn.className = inactiveClass;
          amountBtn.querySelector('div').className = inactiveTextClass;
        } else {
          nightBtn.className = inactiveClass;
          nightBtn.querySelector('div').className = inactiveTextClass;
          amountBtn.className = activeClass;
          amountBtn.querySelector('div').className = activeTextClass;
        }
      } catch (error) {
        console.error('Error updating discount button style:', error);
      }
    }

    // 绑定折扣情况按钮事件
    function bindDiscountButtonEvents() {
      const nightBtn = document.getElementById('discount-night-btn');
      const amountBtn = document.getElementById('discount-amount-btn');

      if (nightBtn) {
        nightBtn.addEventListener('click', () => {
          discountDataType = 'night';
          discountChart.setOption({
            series: [{ data: discountData[discountDataType] }]
          });
          updateDiscountButtonStyle('night');
        });
      }

      if (amountBtn) {
        amountBtn.addEventListener('click', () => {
          discountDataType = 'amount';
          discountChart.setOption({
            series: [{ data: discountData[discountDataType] }]
          });
          updateDiscountButtonStyle('amount');
        });
      }
    }

    // 绑定图例点击交互
    function bindLegendInteractions() {
      const legendItems = document.querySelectorAll('.legend-item');
      
      legendItems.forEach((item, index) => {
        item.addEventListener('click', () => {
          if (!fixedPriceChart) return;
          
          // 切换选中状态
          const isSelected = item.classList.contains('selected');
          
          // 重置所有图例样式
          legendItems.forEach(li => {
            li.classList.remove('selected');
            li.style.opacity = '1';
          });
          
          if (!isSelected) {
            // 选中当前图例
            item.classList.add('selected');
            item.style.opacity = '1';
            
            // 其他图例变暗
            legendItems.forEach((li, i) => {
              if (i !== index) {
                li.style.opacity = '0.3';
              }
            });
            
            // 高亮图表对应部分
            fixedPriceChart.dispatchAction({
              type: 'highlight',
              seriesIndex: 0,
              dataIndex: index
            });
            
            // 显示tooltip
            fixedPriceChart.dispatchAction({
              type: 'showTip',
              seriesIndex: 0,
              dataIndex: index
            });
          } else {
            // 取消选中，恢复所有
            legendItems.forEach(li => {
              li.style.opacity = '1';
            });
            
            // 取消高亮
            fixedPriceChart.dispatchAction({
              type: 'downplay',
              seriesIndex: 0
            });
            
            // 隐藏tooltip
            fixedPriceChart.dispatchAction({
              type: 'hideTip'
            });
          }
        });
        
        // 鼠标悬停效果
        item.addEventListener('mouseenter', () => {
          if (!item.classList.contains('selected')) {
            item.style.opacity = '0.8';
          }
        });
        
        item.addEventListener('mouseleave', () => {
          if (!item.classList.contains('selected')) {
            item.style.opacity = '1';
          }
        });
      });
      
      // 监听图表点击事件，同步更新图例状态
      if (fixedPriceChart) {
        fixedPriceChart.on('click', function(params) {
          const index = params.dataIndex;
          const legendItem = legendItems[index];
          
          if (legendItem) {
            // 触发图例点击
            legendItem.click();
          }
        });
      }
    }

    // 响应式处理函数
    function handleResize() {
      try {
        clearTimeout(window.resizeTimer);
        window.resizeTimer = setTimeout(function() {
          if (fixedPriceChart) fixedPriceChart.resize();
          if (discountChart) discountChart.resize();
          if (cityTop10Chart) cityTop10Chart.resize();
          console.log('Charts resized successfully');
        }, 250);
      } catch (error) {
        console.error('Error during resize:', error);
      }
    }

    // 初始化所有图表
    function initializeAllCharts() {
      try {
        if (!checkEChartsLoaded()) {
          return;
        }

        console.log('Initializing all charts...');
        
        initFixedPriceChart();
        initDiscountChart();
        initCityTop10Chart();
        
        // 初始化按钮样式
        updateFixedPriceButtonStyle('night');
        updateDiscountButtonStyle('night');

        // 绑定按钮事件
        bindFixedPriceButtonEvents();
        bindDiscountButtonEvents();
        
        // 绑定图例交互
        bindLegendInteractions();
        
        // 添加窗口大小变化监听
        window.addEventListener('resize', handleResize);
        console.log('All charts initialized successfully');
      } catch (error) {
        console.error('Error during chart initialization:', error);
      }
    }

    // 等待DOM和ECharts加载完成
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initializeAllCharts);
    } else {
      initializeAllCharts();
    }

    // 窗口加载完成后再次确保图表渲染
    window.addEventListener('load', function() {
      setTimeout(function() {
        console.log('Re-initializing charts after window load...');
        initializeAllCharts();
      }, 100);
    });
  </script>
