<!DOCTYPE html>

<head>

  <script>
    tailwind.config = {
      mode: 'jit',
      important: true,
      theme: {
        extend: {
          colors: {
            primary: '#165DFF',
            success: '#00B42A',
            warning: '#FF7D00',
            danger: '#F53F3F',
            neutral: {
              100: '#F2F3F5',

              300: '#C9CDD4',
              400: '#86909C',
              500: '#4E5969',
              600: '#272E3B',
              700: '#1D2129',

          },
          fontFamily: {
            inter: ['Inter', 'system-ui', 'sans-serif'],

  <style type="text/tailwindcss">
    @layer utilities {
      .content-auto {
        content-visibility: auto;
      }
      .card-shadow {

      }
      .chart-container {
        height: 320px;
        width: 100%;
      }
      .chart-border {
        border-color: rgba(216, 227, 246, 1);
      }
    }

    /* 响应式断点 */
    @media (max-width: 768px) {
      .chart-card {
        width: 100% !important;
        margin-right: 0 !important;
        margin-bottom: 24px;
      }
      .chart-row {
        flex-direction: column !important;
        height: auto;
      }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      .chart-card {
        width: calc(50% - 8px) !important;
        margin-right: 16px !important;
      }
      .chart-row .chart-card:last-child {

      }

    @media (min-width: 1025px) {
      .chart-card {
        width: calc(50% - 12px) !important;
        margin-right: 24px !important;
      }
      .chart-row .chart-card:last-child {

</head>
<body class="bg-white font-inter text-neutral-700">

  <!-- 图表展示区 -->
  <main class="w-full min-h-[832px] flex flex-col justify-start items-center px-[15px]">

            <button id="quoteStatus-amount-btn" class="w-[71px] h-[28px] rounded-[4px] flex justify-center items-center transition-all duration-200 hover:bg-gray-100">

          </div>

      <!-- 酒店星级占比图表 -->

        <div class="w-full h-[28px] flex flex-row justify-between items-center mb-[16px]">

            </button>

            <button id="quoteTrend-hotel-btn" class="w-[71px] h-[28px] rounded-[50px] border-[rgba(239,239,243,1)] border-solid border bg-white mr-[8px] flex justify-center items-center transition-all duration-200 hover:bg-gray-50">
              <span class="text-[14px] whitespace-nowrap text-center text-[rgba(22,93,255,1)] leading-[20px] font-normal tracking-[-0.15px]">酒店</span>
            </button>
            <button id="quoteTrend-night-btn" class="w-[71px] h-[28px] rounded-[4px] flex justify-center items-center transition-all duration-200 hover:bg-gray-100">

            </button>
            <button id="quoteTrend-amount-btn" class="w-[71px] h-[28px] rounded-[4px] flex justify-center items-center transition-all duration-200 hover:bg-gray-100">
              <span class="text-[14px] whitespace-nowrap text-center text-[rgba(78,89,105,1)] leading-[20px] font-normal tracking-[-0.15px]">金额</span>
            </button>

        </div>
        <div id="quoteTrendChart" class="chart-container"></div>
      </div>

  </main>


  <!-- ECharts初始化脚本 -->
  <script>
    // 检查ECharts是否加载成功
    function checkEChartsLoaded() {
      if (typeof echarts === 'undefined') {
        console.error('ECharts library failed to load');
        document.body.innerHTML = '<div style="padding: 20px; color: red;">ECharts库加载失败，请检查网络连接或刷新页面</div>';
        return false;
      }
      console.log('ECharts loaded successfully, version:', echarts.version);
      return true;
    }

    // 统一商务蓝色配色方案（不同透明度/饱和度）
    const blueColors = [
      '#165DFF', // 主蓝色
      '#4080FF',
      '#699EFF',
      '#91BAFF',
      '#B8D1FF',
      '#D3E2FF',
      '#E5EEFF',
      '#F0F5FF',
      '#F8FAFF'
    ];

    // 图表实例存储
    let quoteStatusChart, hotelStarChart, quoteTypeChart, quoteTrendChart;

    // 数据切换状态 - 新增 hotel 维度
    let quoteStatusDataType = 'hotel'; // 'hotel', 'night' or 'amount'
    let hotelStarDataType = 'hotel';
    let quoteTypeDataType = 'hotel';
    let quoteTrendDataType = 'hotel';

    // 1. 报价状态占比数据 - 新增酒店维度（已移除集团折扣）
    const quoteStatusData = {
      hotel: [
        { value: 320, name: '新报价' },
        { value: 280, name: '议价中' },
        { value: 240, name: '修订报价' },
        { value: 450, name: '保持原价' },
        { value: 380, name: '已中签' },
        { value: 180, name: '已拒绝' },
        { value: 220, name: '未报价' },
        { value: 120, name: '放弃报价' }
      ],
      night: [
        { value: 1280, name: '新报价' },
        { value: 960, name: '议价中' },
        { value: 720, name: '修订报价' },
        { value: 1850, name: '保持原价' },
        { value: 1120, name: '已中签' },
        { value: 480, name: '已拒绝' },
        { value: 650, name: '未报价' },
        { value: 210, name: '放弃报价' }
      ],
      amount: [
        { value: 384000, name: '新报价' },
        { value: 288000, name: '议价中' },
        { value: 216000, name: '修订报价' },
        { value: 555000, name: '保持原价' },
        { value: 336000, name: '已中签' },
        { value: 144000, name: '已拒绝' },
        { value: 195000, name: '未报价' },
        { value: 63000, name: '放弃报价' }
      ]
    };

    // 2. 酒店星级占比数据 - 新增酒店维度
    const hotelStarData = {
      hotel: [
        { value: 280, name: '五星级' },
        { value: 260, name: '豪华型' },
        { value: 320, name: '四星级' },
        { value: 240, name: '高档型' },
        { value: 200, name: '三星级' },
        { value: 220, name: '舒适型' },
        { value: 150, name: '二星级及以下' },
        { value: 380, name: '经济型' },
        { value: 140, name: '公寓/其它' }
      ],
      night: [
        { value: 1280, name: '新报价' },
        { value: 960, name: '议价中' },
        { value: 720, name: '修订报价' },
        { value: 1850, name: '保持原价' },
        { value: 1120, name: '已中签' },
        { value: 480, name: '已拒绝' },
        { value: 650, name: '未报价' },
        { value: 210, name: '放弃报价' }
      ],
      amount: [
        { value: 384000, name: '新报价' },
        { value: 288000, name: '议价中' },
        { value: 216000, name: '修订报价' },
        { value: 555000, name: '保持原价' },
        { value: 336000, name: '已中签' },
        { value: 144000, name: '已拒绝' },
        { value: 195000, name: '未报价' },
        { value: 63000, name: '放弃报价' }
      ]
    };

    // 3. 报价类型占比数据 - 新增酒店维度
    const quoteTypeData = {
      hotel: [
        { value: 920, name: '固定价' },
        { value: 580, name: '集团折扣价' },
        { value: 420, name: '非协议价' }
      ],
      night: [
        { value: 3680, name: '固定价' },
        { value: 1850, name: '集团折扣价' },
        { value: 1260, name: '非协议价' }
      ],
      amount: [
        { value: 1104000, name: '固定价' },
        { value: 555000, name: '集团折扣价' },
        { value: 378000, name: '非协议价' }
      ]
    };

    // 4. 报价涨跌趋势数据 - 饼状图数据
    const quoteTrendData = {
      hotel: [
        { value: 45, name: '涨价' },
        { value: 95, name: '持平' },
        { value: 32, name: '降价' }
      ],
      night: [
        { value: 120, name: '涨价' },
        { value: 280, name: '持平' },
        { value: 95, name: '降价' }
      ],
      amount: [
        { value: 3600, name: '涨价' },
        { value: 8400, name: '持平' },
        { value: 2850, name: '降价' }
      ]
    };

    // 按钮样式更新函数 - 支持三个维度
    function updateButtonStyle(prefix, type) {
      try {
        const hotelBtn = document.getElementById(`${prefix}-hotel-btn`);
        const nightBtn = document.getElementById(`${prefix}-night-btn`);
        const amountBtn = document.getElementById(`${prefix}-amount-btn`);

        if (!hotelBtn || !nightBtn || !amountBtn) {
          console.error(`Buttons not found for prefix: ${prefix}`);
          return;
        }

        // 重置所有按钮样式
        const inactiveBtnClass = 'w-[71px] h-[28px] rounded-[4px] flex justify-center items-center transition-all duration-200 hover:bg-gray-100';
        const inactiveSpanClass = 'text-[14px] whitespace-nowrap text-center text-[rgba(78,89,105,1)] leading-[20px] font-normal tracking-[-0.15px]';
        
        const activeBtnClass = 'w-[71px] h-[28px] rounded-[50px] border-[rgba(239,239,243,1)] border-solid border bg-white mr-[8px] flex justify-center items-center transition-all duration-200 hover:bg-gray-50';
        const activeSpanClass = 'text-[14px] whitespace-nowrap text-center text-[rgba(22,93,255,1)] leading-[20px] font-normal tracking-[-0.15px]';

        // 设置酒店按钮
        if (type === 'hotel') {
          hotelBtn.className = activeBtnClass;
          hotelBtn.querySelector('span').className = activeSpanClass;
        } else {
          hotelBtn.className = inactiveBtnClass;
          hotelBtn.querySelector('span').className = inactiveSpanClass;
        }

        // 设置间夜量按钮
        if (type === 'night') {
          nightBtn.className = activeBtnClass;
          nightBtn.querySelector('span').className = activeSpanClass;
        } else {
          nightBtn.className = inactiveBtnClass;
          nightBtn.querySelector('span').className = inactiveSpanClass;
        }

        // 设置金额按钮
        if (type === 'amount') {
          amountBtn.className = activeBtnClass;
          amountBtn.querySelector('span').className = activeSpanClass;
        } else {
          amountBtn.className = inactiveBtnClass;
          amountBtn.querySelector('span').className = inactiveSpanClass;
        }
      } catch (error) {
        console.error('Error updating button style:', error);
      }
    }

    // 1. 报价状态占比 - 环形饼图（去除集团折扣）
    function initQuoteStatusChart() {
      try {
        const chartDom = document.getElementById('quoteStatusChart');
        if (!chartDom) {
          console.error('quoteStatusChart container not found');
          return;
        }

        quoteStatusChart = echarts.init(chartDom);

        const currentData = quoteStatusData[quoteStatusDataType];
        
        const suffixMap = { hotel: ' 家', night: ' 间夜', amount: ' 元' };
        
        const option = {
          tooltip: {
            trigger: 'item',
            formatter: function(params) {
              const suffix = suffixMap[quoteStatusDataType];
              return `${params.name}: ${params.value.toLocaleString()}${suffix} (${params.percent}%)`;
            }
          },
          legend: {
            orient: 'vertical',
            right: 0,
            top: 'center',
            textStyle: { fontSize: 12, color: '#4E5969' }
          },
          series: [{
            name: '报价状态',
            type: 'pie',
            radius: ['40%', '75%'],
            center: ['38%', '50%'],
            itemStyle: {
              borderRadius: 6,
              borderColor: '#fff',
              borderWidth: 2
            },
            label: {
              show: true,
              formatter: '{b}',
              color: '#4E5969',
              fontSize: 11
            },
            data: currentData,
            color: blueColors
          }]
        };

        quoteStatusChart.setOption(option);
        console.log('Quote status chart initialized successfully');

        // 绑定按钮事件
        const hotelBtn = document.getElementById('quoteStatus-hotel-btn');
        const nightBtn = document.getElementById('quoteStatus-night-btn');
        const amountBtn = document.getElementById('quoteStatus-amount-btn');

        if (hotelBtn) {
          hotelBtn.addEventListener('click', () => {
            quoteStatusDataType = 'hotel';
            initQuoteStatusChart();
            updateButtonStyle('quoteStatus', 'hotel');
          });
        }

        if (nightBtn) {
          nightBtn.addEventListener('click', () => {
            quoteStatusDataType = 'night';
            initQuoteStatusChart();
            updateButtonStyle('quoteStatus', 'night');
          });
        }

        if (amountBtn) {
          amountBtn.addEventListener('click', () => {
            quoteStatusDataType = 'amount';
            initQuoteStatusChart();
            updateButtonStyle('quoteStatus', 'amount');
          });
        }
      } catch (error) {
        console.error('Error initializing quote status chart:', error);
      }
    }

    // 2. 酒店星级占比 - 玫瑰饼图（半径区分大小）
    function initHotelStarChart() {
      try {
        const chartDom = document.getElementById('hotelStarChart');
        if (!chartDom) {
          console.error('hotelStarChart container not found');
          return;
        }
        
        hotelStarChart = echarts.init(chartDom);
        
        const suffixMap = { hotel: ' 家', night: ' 间夜', amount: ' 元' };
        
        const option = {
          tooltip: {
            trigger: 'item',
            formatter: function(params) {
              const suffix = suffixMap[hotelStarDataType];
              return `${params.name}: ${params.value.toLocaleString()}${suffix} (${params.percent}%)`;
            }
          },
          legend: {
            orient: 'vertical',
            right: 0,
            top: 'center',
            textStyle: { fontSize: 11, color: '#4E5969' }
          },
          series: [{
            name: '酒店星级',
            type: 'pie',
            radius: ['20%', '70%'],
            center: ['40%', '50%'],
            roseType: 'radius',
            itemStyle: {
              borderRadius: 4,
              borderColor: '#fff',
              borderWidth: 2
            },
            data: hotelStarData[hotelStarDataType],
            color: blueColors
          }]
        };
        
        hotelStarChart.setOption(option);
        console.log('Hotel star chart initialized successfully');

        // 绑定按钮事件
        const hotelBtn = document.getElementById('hotelStar-hotel-btn');
        const nightBtn = document.getElementById('hotelStar-night-btn');
        const amountBtn = document.getElementById('hotelStar-amount-btn');
        
        if (hotelBtn) {
          hotelBtn.addEventListener('click', () => {
            hotelStarDataType = 'hotel';
            hotelStarChart.setOption({ series: [{ data: hotelStarData[hotelStarDataType] }] });
            updateButtonStyle('hotelStar', 'hotel');
          });
        }
        
        if (nightBtn) {
          nightBtn.addEventListener('click', () => {
            hotelStarDataType = 'night';
            hotelStarChart.setOption({ series: [{ data: hotelStarData[hotelStarDataType] }] });
            updateButtonStyle('hotelStar', 'night');
          });
        }
        
        if (amountBtn) {
          amountBtn.addEventListener('click', () => {
            hotelStarDataType = 'amount';
            hotelStarChart.setOption({ series: [{ data: hotelStarData[hotelStarDataType] }] });
            updateButtonStyle('hotelStar', 'amount');
          });
        }
      } catch (error) {
        console.error('Error initializing hotel star chart:', error);
      }
    }

    // 3. 报价类型占比 - 南丁格尔图（面积区分）
    function initQuoteTypeChart() {
      try {
        const chartDom = document.getElementById('quoteTypeChart');
        if (!chartDom) {
          console.error('quoteTypeChart container not found');
          return;
        }
        
        quoteTypeChart = echarts.init(chartDom);
        
        const suffixMap = { hotel: ' 家', night: ' 间夜', amount: ' 元' };
        
        const option = {
          tooltip: {
            trigger: 'item',
            formatter: function(params) {
              const suffix = suffixMap[quoteTypeDataType];
              return `${params.name}: ${params.value.toLocaleString()}${suffix} (${params.percent}%)`;
            }
          },
          legend: {
            bottom: 0,
            left: 'center',
            textStyle: { fontSize: 12, color: '#4E5969' }
          },
          series: [{
            name: '报价类型',
            type: 'pie',
            radius: ['15%', '70%'],
            center: ['50%', '40%'],
            roseType: 'area',
            itemStyle: {
              borderRadius: 8,
              borderColor: '#fff',
              borderWidth: 2
            },
            label: {
              formatter: function(params) {
                return `${params.name}\n${params.percent}%`;
              }
            },
            data: quoteTypeData[quoteTypeDataType],
            color: ['#165DFF', '#699EFF', '#B8D1FF']
          }]
        };
        
        quoteTypeChart.setOption(option);
        console.log('Quote type chart initialized successfully');

        // 绑定按钮事件
        const hotelBtn = document.getElementById('quoteType-hotel-btn');
        const nightBtn = document.getElementById('quoteType-night-btn');
        const amountBtn = document.getElementById('quoteType-amount-btn');
        
        if (hotelBtn) {
          hotelBtn.addEventListener('click', () => {
            quoteTypeDataType = 'hotel';
            quoteTypeChart.setOption({ series: [{ data: quoteTypeData[quoteTypeDataType] }] });
            updateButtonStyle('quoteType', 'hotel');
          });
        }
        
        if (nightBtn) {
          nightBtn.addEventListener('click', () => {
            quoteTypeDataType = 'night';
            quoteTypeChart.setOption({ series: [{ data: quoteTypeData[quoteTypeDataType] }] });
            updateButtonStyle('quoteType', 'night');
          });
        }
        
        if (amountBtn) {
          amountBtn.addEventListener('click', () => {
            quoteTypeDataType = 'amount';
            quoteTypeChart.setOption({ series: [{ data: quoteTypeData[quoteTypeDataType] }] });
            updateButtonStyle('quoteType', 'amount');
          });
        }
      } catch (error) {
        console.error('Error initializing quote type chart:', error);
      }
    }

    // 4. 报价涨跌趋势 - 分组柱状图+折线组合图（非环状图）
    function initQuoteTrendChart() {
      try {
        const chartDom = document.getElementById('quoteTrendChart');
        if (!chartDom) {
          console.error('quoteTrendChart container not found');
          return;
        }
        
        quoteTrendChart = echarts.init(chartDom);
        
        const suffixMap = { hotel: ' 家', night: ' 间夜', amount: ' 元' };
        
        const option = {
          tooltip: { 
            trigger: 'item',
            formatter: function(params) {
              const suffix = suffixMap[quoteTrendDataType];
              return `${params.marker}${params.name}: ${params.value.toLocaleString()}${suffix}<br/>占比: ${params.percent}%`;
            }
          },
          legend: {
            data: ['涨价','持平','降价'],
            bottom: 0,
            textStyle: { color: '#4E5969', fontSize: 11 }
          },
          series: [
            {
              name: '报价趋势',
              type: 'pie',
              radius: '65%',
              center: ['50%', '45%'],
              data: quoteTrendData[quoteTrendDataType],
              itemStyle: {
                borderRadius: 8,
                borderColor: '#fff',
                borderWidth: 2
              },
              label: {
                show: true,
                formatter: '{b}\n{d}%',
                fontSize: 12,
                color: '#4E5969'
              },
              labelLine: {
                show: true,
                length: 15,
                length2: 10
              },
              emphasis: {
                itemStyle: {
                  shadowBlur: 10,
                  shadowOffsetX: 0,
                  shadowColor: 'rgba(0, 0, 0, 0.5)'
                }
              }
            }
          ],
          color: ['#165DFF', '#4080FF', '#91BAFF']
        };
        
        quoteTrendChart.setOption(option);
        console.log('Quote trend chart initialized successfully');

        // 绑定按钮事件
        const hotelBtn = document.getElementById('quoteTrend-hotel-btn');
        const nightBtn = document.getElementById('quoteTrend-night-btn');
        const amountBtn = document.getElementById('quoteTrend-amount-btn');
        
        if (hotelBtn) {
          hotelBtn.addEventListener('click', () => {
            quoteTrendDataType = 'hotel';
            quoteTrendChart.setOption({
              series: [
                { data: quoteTrendData[quoteTrendDataType] }
              ]
            });
            updateButtonStyle('quoteTrend', 'hotel');
          });
        }
        
        if (nightBtn) {
          nightBtn.addEventListener('click', () => {
            quoteTrendDataType = 'night';
            quoteTrendChart.setOption({
              series: [
                { data: quoteTrendData[quoteTrendDataType] }
              ]
            });
            updateButtonStyle('quoteTrend', 'night');
          });
        }
        
        if (amountBtn) {
          amountBtn.addEventListener('click', () => {
            quoteTrendDataType = 'amount';
            quoteTrendChart.setOption({
              series: [
                { data: quoteTrendData[quoteTrendDataType] }
              ]
            });
            updateButtonStyle('quoteTrend', 'amount');
          });
        }
      } catch (error) {
        console.error('Error initializing quote trend chart:', error);
      }
    }

    // 响应式处理函数
    function handleResize() {
      try {
        // 添加延迟以确保DOM布局完成
        clearTimeout(window.resizeTimer);
        window.resizeTimer = setTimeout(function() {
          if (quoteStatusChart) quoteStatusChart.resize();
          if (hotelStarChart) hotelStarChart.resize();
          if (quoteTypeChart) quoteTypeChart.resize();
          if (quoteTrendChart) quoteTrendChart.resize();
          console.log('Charts resized successfully');
        }, 250);
      } catch (error) {
        console.error('Error during resize:', error);
      }
    }

    // 初始化所有图表
    function initializeAllCharts() {
      try {
        // 检查ECharts是否加载
        if (!checkEChartsLoaded()) {
          return;
        }

        console.log('Initializing all charts...');
        console.log('Window width:', window.innerWidth);
        
        initQuoteStatusChart();
        initHotelStarChart();
        initQuoteTypeChart();
        initQuoteTrendChart();
        
        // 初始化按钮样式
        updateButtonStyle('quoteStatus', 'hotel');
        updateButtonStyle('hotelStar', 'hotel');
        updateButtonStyle('quoteType', 'hotel');
        updateButtonStyle('quoteTrend', 'hotel');
        
        // 添加窗口大小变化监听
        window.addEventListener('resize', handleResize);
        console.log('All charts initialized successfully');
        
        // 验证布局
        setTimeout(function() {
          const firstCard = document.querySelector('.chart-card');
          if (firstCard) {
            console.log('First card width:', firstCard.offsetWidth);
          }
        }, 500);
      } catch (error) {
        console.error('Error during chart initialization:', error);
      }
    }

    // 等待DOM和ECharts加载完成
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', initializeAllCharts);
    } else {
      initializeAllCharts();
    }

    // 窗口加载完成后再次确保图表渲染
    window.addEventListener('load', function() {
      setTimeout(function() {
        console.log('Re-initializing charts after window load...');
        initializeAllCharts();
      }, 100);
    });
  </script>
</body>
</html>
